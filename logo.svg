<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e3320;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5c38;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- Shield Shape -->
  <path d="M 50 20 L 70 30 L 70 55 Q 70 70 50 80 Q 30 70 30 55 L 30 30 Z" 
        fill="#c8a84b" opacity="0.3"/>
  
  <!-- Wheat Icon -->
  <g transform="translate(50, 35)">
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="35" stroke="#c8a84b" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Grains Left -->
    <ellipse cx="-3" cy="5" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(-20 -3 5)"/>
    <ellipse cx="-3" cy="12" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(-20 -3 12)"/>
    <ellipse cx="-3" cy="19" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(-20 -3 19)"/>
    <ellipse cx="-3" cy="26" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(-20 -3 26)"/>
    
    <!-- Grains Right -->
    <ellipse cx="3" cy="5" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(20 3 5)"/>
    <ellipse cx="3" cy="12" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(20 3 12)"/>
    <ellipse cx="3" cy="19" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(20 3 19)"/>
    <ellipse cx="3" cy="26" rx="2.5" ry="4" fill="#e8c96a" transform="rotate(20 3 26)"/>
    
    <!-- Top grain -->
    <ellipse cx="0" cy="0" rx="2" ry="3" fill="#c8a84b"/>
  </g>
</svg>
